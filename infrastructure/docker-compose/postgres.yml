services:
  postgres:
    image: postgres:16-alpine
    container_name: shopgrid-postgres
    environment:
      POSTGRES_DB: shopgrid
      POSTGRES_USER: shopgrid
      POSTGRES_PASSWORD: shopgrid
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopgrid -d shopgrid"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
