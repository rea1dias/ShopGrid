server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**

        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payments/**

        - id: inventory-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/inventory/**

security:
  jwt:
    secret: ${JWT_SECRET:shopgrid-development-secret-key-change-before-production-please-keep-it-long}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT1H}

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health, info